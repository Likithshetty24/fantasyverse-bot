name: Raat Ki Kahaniyan Daily Short

on:
  schedule:
    # 8 PM IST = 14:30 UTC — peak prime time for Indian audience
    - cron: '30 14 * * *'
  workflow_dispatch:

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system dependencies (incl. Hindi fonts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            fonts-liberation \
            fonts-noto-core \
            fonts-noto-cjk \
            fonts-indic
          # Verify Devanagari font is available
          fc-list | grep -i devanagari | head -5 || echo "Devanagari font check"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Raat Ki Kahaniyan Bot
        env:
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        working-directory: scripts
        run: python main.py

name: Fantasy Verse Daily Shorts

on:
  schedule:
    - cron: '0 20 * * *'   # 8 PM UTC = 3 PM EST = peak YouTube traffic
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation fonts-noto-core

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Kokoro TTS models
        id: kokoro-cache
        uses: actions/cache@v4
        with:
          path: /tmp/kokoro
          key: kokoro-models-v1.0

      - name: Download Kokoro TTS models (non-fatal — falls back to gTTS if fails)
        if: steps.kokoro-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          mkdir -p /tmp/kokoro
          echo "Downloading Kokoro ONNX model (~310 MB)..."
          wget -q -O /tmp/kokoro/kokoro-v1.0.onnx \
            https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx \
            || echo "Model download failed — will use gTTS fallback"
          echo "Downloading voices file (trying multiple URLs)..."
          # The voices file has had several names across kokoro-onnx releases —
          # try each in order until one works.
          for url in \
            "https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin" \
            "https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices.bin" \
            "https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files/voices.bin" \
            "https://huggingface.co/thewh1teagle/kokoro-onnx/resolve/main/voices-v1.0.bin"
          do
            echo "Trying: $url"
            if wget -q -O /tmp/kokoro/voices.bin "$url"; then
              if [ -s /tmp/kokoro/voices.bin ]; then
                echo "Voices file downloaded successfully from $url"
                break
              fi
            fi
            rm -f /tmp/kokoro/voices.bin
          done
          echo "Files in /tmp/kokoro:"
          ls -lh /tmp/kokoro/ || true
          # If either file is missing, remove the cache directory so we use gTTS
          if [ ! -s /tmp/kokoro/kokoro-v1.0.onnx ] || [ ! -s /tmp/kokoro/voices.bin ]; then
            echo "Kokoro models incomplete — clearing dir, will use gTTS fallback"
            rm -rf /tmp/kokoro
            mkdir -p /tmp/kokoro
          fi

      - name: Run Fantasy Verse Bot
        env:
          GROQ_API_KEY:            ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_SECRETS:  ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_REFRESH_TOKEN:   ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          KOKORO_MODEL_DIR:        /tmp/kokoro
        working-directory: scripts
        run: python main.py

      - name: Clean up secrets file
        if: always()
        run: rm -f client_secrets.json

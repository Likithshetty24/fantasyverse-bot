name: Extra Time Match Monitor

on:
  # PAUSED 2026-06-19: channel hit Shorts distribution throttling (new uploads
  # getting ~0 views) — likely YouTube's repetitive/mass-produced content
  # demotion, accelerated by a copyright removal. Auto-posting disabled while
  # we reduce volume and let reach recover. Re-enable by uncommenting the cron.
  # schedule:
  #   - cron: '*/30 * * * *'
  workflow_dispatch:

# Needed so the workflow can commit the posted-events state file back
permissions:
  contents: write

# Prevent overlapping runs (a video render can take several minutes)
concurrency:
  group: match-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation fonts-noto-core

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run match monitor
        env:
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:        ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          FOOTBALL_DATA_API_KEY:  ${{ secrets.FOOTBALL_DATA_API_KEY }}
        working-directory: scripts
        run: python match_monitor.py

      - name: Commit updated state
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain data/posted_events.json)" ]; then
            echo "No state change to commit."
            exit 0
          fi
          git add data/posted_events.json
          git commit -m "chore: update posted match events [skip ci]"
          # Remote master may have moved (concurrent run / other pushes).
          # Rebase our tiny state commit on top and retry the push so we
          # never lose the posted-events record (which would cause re-posts).
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash origin master && git push; then
              echo "State pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying in 5s..."
            sleep 5
          done
          echo "ERROR: could not push state after 5 attempts."
          exit 1

name: The AI Stack Daily Short

on:
  schedule:
    # 14:00 UTC = 10am ET / 7am PT / 7:30pm IST — catches US morning,
    # India evening, Europe afternoon. Solid mixed-audience window.
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation fonts-noto-core

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run The AI Stack Bot
        env:
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        working-directory: scripts
        run: python main.py
